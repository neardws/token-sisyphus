name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: pip install openai

      - name: Smoke test (dry-run, openai provider)
        run: python burn.py --target 5k --dry-run

      - name: Smoke test (dry-run, target formats)
        run: |
          python burn.py --target 1000 --dry-run
          python burn.py --target 2k --dry-run
          python burn.py --target 0.1m --dry-run

      - name: Verify help output
        run: python burn.py --help
