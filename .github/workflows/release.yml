name: Release

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install openai

      - name: Run smoke test before release
        run: python burn.py --target 5k --dry-run

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Create archives
        run: |
          VER=${{ steps.version.outputs.version }}

          # Core only
          zip -j token-sisyphus-core-${VER}.zip burn.py

          # All skills (bundle)
          zip -r token-sisyphus-skills-all-${VER}.zip skills/ --exclude "*.pyc"

          # Per-platform skill packages
          zip -j token-sisyphus-skill-claude-code-${VER}.zip   skills/claude-code/CLAUDE.md
          zip -j token-sisyphus-skill-codex-${VER}.zip         skills/codex/AGENTS.md
          zip -j token-sisyphus-skill-gemini-cli-${VER}.zip    skills/gemini-cli/gemini.md
          zip -j token-sisyphus-skill-opencode-${VER}.zip      skills/opencode/rules.md
          zip -j token-sisyphus-skill-openclaw-${VER}.zip      skills/openclaw/SKILL.md

          # Full bundle (everything)
          zip -r token-sisyphus-full-${VER}.zip \
            burn.py README.md docs/ skills/ assets/ CHANGELOG.md \
            --exclude "*.pyc" --exclude "__pycache__/*" --exclude ".venv/*"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "🪨 token-sisyphus ${{ steps.version.outputs.version }}"
          body: |
            ## Downloads

            | Package | Contents |
            |---------|----------|
            | `token-sisyphus-core-*.zip` | `burn.py` only |
            | `token-sisyphus-skills-all-*.zip` | All platform skill files |
            | `token-sisyphus-skill-claude-code-*.zip` | Claude Code (`CLAUDE.md`) |
            | `token-sisyphus-skill-codex-*.zip` | OpenAI Codex (`AGENTS.md`) |
            | `token-sisyphus-skill-gemini-cli-*.zip` | Gemini CLI (`gemini.md`) |
            | `token-sisyphus-skill-opencode-*.zip` | OpenCode (`rules.md`) |
            | `token-sisyphus-skill-openclaw-*.zip` | OpenClaw (`SKILL.md`) |
            | `token-sisyphus-full-*.zip` | Everything |

            ## Quick start

            ```bash
            # Core only
            unzip token-sisyphus-core-*.zip
            pip install openai
            python burn.py --target 100k --dry-run

            # Claude
            pip install anthropic
            python burn.py --target 100k --provider claude --dry-run

            # Gemini
            pip install google-generativeai
            python burn.py --target 100k --provider gemini --dry-run
            ```

            ## Changelog
            See [CHANGELOG.md](https://github.com/neardws/token-sisyphus/blob/main/CHANGELOG.md)
          files: |
            token-sisyphus-core-${{ steps.version.outputs.version }}.zip
            token-sisyphus-skills-all-${{ steps.version.outputs.version }}.zip
            token-sisyphus-skill-claude-code-${{ steps.version.outputs.version }}.zip
            token-sisyphus-skill-codex-${{ steps.version.outputs.version }}.zip
            token-sisyphus-skill-gemini-cli-${{ steps.version.outputs.version }}.zip
            token-sisyphus-skill-opencode-${{ steps.version.outputs.version }}.zip
            token-sisyphus-skill-openclaw-${{ steps.version.outputs.version }}.zip
            token-sisyphus-full-${{ steps.version.outputs.version }}.zip
          draft: false
          prerelease: false
